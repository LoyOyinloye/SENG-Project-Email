<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Email Workflow</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <!-- Header Rendered Here -->
        <header id="main-header" style="display: none;">
            <div class="logo"><strong>InstiMail</strong></div>
            <nav>
                <button onclick="App.navigate('dashboard')" class="btn btn-secondary">Dashboard</button>
                <button onclick="App.navigate('compose')" class="btn btn-primary">Compose</button>
                <button onclick="App.logout()" class="btn btn-danger">Logout</button>
            </nav>
        </header>

        <main id="main-content">
            <!-- Content Rendered Here -->
            <div class="login-container">
                <div class="card">
                    <h2>Login</h2>
                    <form onsubmit="App.login(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required
                                value="admin@institution.edu">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" required value="admin123">
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal hidden"></div>

    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
